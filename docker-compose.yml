services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
      - ./docker/php/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: monefy
      DB_USERNAME: root
      DB_PASSWORD: root
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
        test: [ "CMD","php-fpm","-t" ]
        interval: 5s
        retries: 5
    user: "1000:1000"

  nginx:
    image: nginx:1.25
    ports:
      - "8080:80"
    depends_on:
        php:
            condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: monefy
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  node:
    image: node:24-alpine
    working_dir: /var/www/html
    volumes:
      - ./frontend:/var/www/html
      - frontend_node_modules:/var/www/html/node_modules
    depends_on:
      - nginx
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api
      NUXT_API_INTERNAL_BASE: http://nginx/api
    ports:
      - "3001:3000"
    tty: true
    user: "root"
    command: sh -c "mkdir -p node_modules .nuxt /home/node/.npm && chown -R node:node node_modules .nuxt /home/node/.npm && su node -c 'npm install && npm run dev -- --host 0.0.0.0'"

volumes:
  mysql_data:
  frontend_node_modules:
